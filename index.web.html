<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050507" />
    <meta name="description" content="XO Screens — AI-powered productivity workspace. Chat, notes, video summaries." />
    <title>XO Screens</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%; height: 100%;
        background: #050507;
        overflow: hidden;
        font-family: 'Inter', system-ui, sans-serif;
        color: #fff;
        -webkit-font-smoothing: antialiased;
        font-size: 16px;
      }

      /*
       * Scale the entire app to replicate 150% browser zoom on a 2560×1440 display.
       * zoom: 1.5 makes every px render 1.5× larger, so 13px text looks like 19.5px,
       * layouts feel spacious, and the UI fills a 1440p monitor beautifully.
       * We counter-scale width/height so the root still covers the full screen.
       */
      #root {
        zoom: 1.2;
        width: calc(100vw / 1.2);
        height: calc(100dvh / 1.2);
        overflow: hidden;
      }

      /* ── Splash screen ── */
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        background: #050507;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 20px;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }
      #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

      .splash-logo {
        font-family: 'Syne', sans-serif;
        font-size: 48px; font-weight: 800;
        letter-spacing: -0.04em;
        background: linear-gradient(135deg, #EBB159 0%, #EE6F53 60%, rgba(238,111,83,0.7) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        color: transparent;
        filter: drop-shadow(0 0 24px rgba(238,111,83,0.4));
        animation: splashPulse 1.8s ease-in-out infinite alternate;
      }
      .splash-bar {
        width: 120px; height: 3px; border-radius: 99px;
        background: rgba(235,177,89,0.12);
        overflow: hidden;
      }
      .splash-bar-fill {
        height: 100%; border-radius: 99px;
        background: linear-gradient(90deg, #EBB159, #EC9056, #EE6F53);
        animation: splashLoad 1.2s cubic-bezier(0.4,0,0.2,1) forwards;
      }
      @keyframes splashPulse {
        from { opacity: 0.6; }
        to   { opacity: 1; }
      }
      @keyframes splashLoad {
        from { width: 0; }
        to   { width: 100%; }
      }
    </style>
    <script>
      // ── Usage Tracking Bootstrap (Web) ───────────────────────────────────
      // Runs before React so sessions are initialised early and page-time
      // is accurately captured even if the user refreshes.
      ;(function () {
        var STATS_KEY   = 'xo-usage-stats'
        var SESSION_KEY = 'xo-current-session'
        var now = Date.now()
        var SESSION_TIMEOUT = 30 * 60 * 1000 // 30 minutes

        function getStats() {
          try { return JSON.parse(localStorage.getItem(STATS_KEY)) || null } catch { return null }
        }
        function saveStats(s) {
          try { localStorage.setItem(STATS_KEY, JSON.stringify(s)) } catch {}
        }

        // Seed default stats if missing
        var stats = getStats()
        if (!stats) {
          stats = {
            chatMessagesUser: 0, chatMessagesAI: 0, chatSessions: 0, chatToolCalls: 0,
            notesCreated: 0, notesEdited: 0, notesDeleted: 0, notesWordCount: 0,
            videoCaptionsGenerated: 0, videoFilesProcessed: 0,
            totalSessions: 0, totalTimeSpent: 0,
            lastSessionDate: now, firstSessionDate: now,
            featuresUsed: { chat: 0, notes: 0, video: 0, settings: 0 },
            dailyStats: [],
          }
          saveStats(stats)
        }

        // Handle stale session from previous page visit
        try {
          var rawSession = localStorage.getItem(SESSION_KEY)
          if (rawSession) {
            var prevSession = JSON.parse(rawSession)
            var elapsed = now - prevSession.startTime
            if (elapsed > SESSION_TIMEOUT) {
              // Session timed out — credit leftover time and clear
              stats.totalTimeSpent = (stats.totalTimeSpent || 0) + elapsed
              saveStats(stats)
              localStorage.removeItem(SESSION_KEY)
            }
          }
        } catch (e) { /* non-fatal */ }

        // When the page unloads, persist session duration
        function onPageHide() {
          try {
            var rawS = localStorage.getItem(SESSION_KEY)
            if (!rawS) return
            var ses = JSON.parse(rawS)
            var duration = Date.now() - ses.startTime
            var s2 = getStats()
            if (s2) {
              s2.totalTimeSpent = (s2.totalTimeSpent || 0) + duration
              saveStats(s2)
            }
            localStorage.removeItem(SESSION_KEY)
          } catch (e) { /* non-fatal */ }
        }
        window.addEventListener('pagehide', onPageHide)
        window.addEventListener('beforeunload', onPageHide)
      })()
    </script>
  </head>
  <body>
    <!-- Splash -->
    <div id="splash">
      <div class="splash-logo">XO</div>
      <div class="splash-bar"><div class="splash-bar-fill"></div></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/web-main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash')
          if (s) s.classList.add('hidden')
        }, 1400)
      })
    </script>
  </body>
</html>
