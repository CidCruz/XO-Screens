<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#050507" />
    <meta name="description" content="XO Screens — AI-powered productivity workspace. Chat, notes, video summaries." />
    <title>XO Screens</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%; height: 100%;
        background: #050507;
        overflow: hidden;
        font-family: 'Inter', system-ui, sans-serif;
        color: #fff;
        -webkit-font-smoothing: antialiased;
      }

      #root { width: 100vw; height: 100dvh; }

      /* ── Splash screen ── */
      #splash {
        position: fixed; inset: 0; z-index: 9999;
        background: #050507;
        display: flex; align-items: center; justify-content: center;
        flex-direction: column; gap: 20px;
        transition: opacity 0.6s ease, visibility 0.6s ease;
      }
      #splash.hidden { opacity: 0; visibility: hidden; pointer-events: none; }

      .splash-logo {
        font-family: 'Syne', sans-serif;
        font-size: 48px; font-weight: 800;
        letter-spacing: -0.04em;
        background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.4) 100%);
        -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        animation: splashPulse 1.8s ease-in-out infinite alternate;
      }
      .splash-bar {
        width: 120px; height: 2px; border-radius: 99px;
        background: rgba(255,255,255,0.08);
        overflow: hidden;
      }
      .splash-bar-fill {
        height: 100%; border-radius: 99px;
        background: linear-gradient(90deg, rgba(99,102,241,0.8), rgba(139,92,246,0.8), rgba(52,211,153,0.8));
        animation: splashLoad 1.2s cubic-bezier(0.4,0,0.2,1) forwards;
      }
      @keyframes splashPulse {
        from { opacity: 0.6; }
        to   { opacity: 1; }
      }
      @keyframes splashLoad {
        from { width: 0; }
        to   { width: 100%; }
      }
    </style>
  </head>
  <body>
    <!-- Splash -->
    <div id="splash">
      <div class="splash-logo">XO</div>
      <div class="splash-bar"><div class="splash-bar-fill"></div></div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/web-main.tsx"></script>
    <script>
      window.addEventListener('load', () => {
        setTimeout(() => {
          const s = document.getElementById('splash')
          if (s) s.classList.add('hidden')
        }, 1400)
      })
    </script>
  </body>
</html>
